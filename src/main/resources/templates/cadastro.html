<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Pernambuco - Cadastro de Eventos</title>
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <header>
        <h2>Arena Pernambuco</h2>
        <nav>
            <a href="/">Ver Catálogo</a>
            <a href="/meus-ingressos">Meus Ingressos</a>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Cadastrar Novo Evento</h1>
        <p class="page-subtitle">Adicione um novo evento à programação da Arena.</p>

        <div class="form-container">
            
            <form th:action="@{/salvar-evento}" th:object="${novoEvento}" method="post">

                <div class="form-group">
                    <label for="nome">Nome do Evento:</label>
                    <input type="text" id="nome" th:field="*{nome}" placeholder="Ex: Náutico x Sport" required>
                </div>

                <div class="form-group">
                    <label for="data">Data e Hora:</label>
                    <input type="datetime-local" id="data" th:field="*{data}" required>
    
                    <p th:if="${erroData}" th:text="${erroData}" style="color: red; font-weight: bold; margin-top: 5px;"></p>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoria:</label>
                    <select id="categoria" th:field="*{categoria}" required>
                        <option value="">Selecione uma categoria...</option>
                        <option value="Esporte">Esporte</option>
                        <option value="Shows">Shows</option>
                        <option value="Cultura">Cultura</option>
                        <option value="Filme">Filme</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="capacidadeDisponivel">Capacidade Máxima:</label>
                    <input type="number" id="capacidadeDisponivel" th:field="*{capacidadeDisponivel}" placeholder="Ex: 40000" min="1" required>
                </div>

                <button type="submit" class="btn-salvar">Salvar Evento</button>
            
            </form>
        </div>
    </main>

</body>
</html>
